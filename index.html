<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO-DOROTHY 2099 — 잃어버린 동기화</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

:root {
  --bg:     #080b0f;
  --panel:  rgba(10,13,18,0.97);
  --green:  #00FF66;
  --red:    #FF003C;
  --amber:  #F39C12;
  --cyan:   #3498DB;
  --purple: #bf5fff;
  --txt:    #c8c8c0;
  --txt-dim:#525250;
  --mono:   'Share Tech Mono','Courier New',monospace;
  --orb:    'Orbitron',sans-serif;
  --body:   'Noto Sans KR',sans-serif;
  --hdr-h:  62px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--txt); font-family:var(--body); -webkit-font-smoothing:antialiased; user-select:none; }

/* ── HUD ── */
#hud {
  height: var(--hdr-h); display:flex; align-items:center;
  padding:0 22px; gap:20px;
  background: rgba(6,8,12,0.98);
  border-bottom: 2px solid rgba(255,0,60,0.5);
  position:relative; z-index:100; flex-shrink:0;
  transition: border-bottom-color .4s;
}
.core-active #hud { border-bottom-color:rgba(191,95,255,.55); }

#hud-logo {
  border:2px solid var(--red); padding:7px 16px;
  font-family:var(--orb); font-size:13px; font-weight:700;
  color:var(--amber); letter-spacing:3px; white-space:nowrap;
  text-shadow:0 0 10px rgba(243,156,18,.45); flex-shrink:0;
  animation:logoGlitch 8s ease-in-out infinite;
}
@keyframes logoGlitch {
  0%,85%,100%{transform:none;filter:none;}
  86%{transform:translateX(-3px);filter:hue-rotate(90deg);}
  87%{transform:translateX(2px);}
  88%{transform:none;filter:none;}
  92%{transform:translateX(1px);filter:brightness(1.5);}
  93%{transform:none;filter:none;}
}
.hud-div { width:1px; height:36px; background:rgba(255,255,255,.07); flex-shrink:0; }

#hud-center { display:flex; gap:30px; align-items:center; flex:1; justify-content:center; }
.hud-stat { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:80px; }
.hstat-lbl { font-family:var(--mono); font-size:8px; letter-spacing:3px; }
.hstat-num { font-family:var(--orb); font-size:22px; font-weight:700; line-height:1; }
.hstat-bar { width:100%; height:2px; background:rgba(255,255,255,.05); }
.hstat-fill { height:100%; width:0%; transition:width .7s cubic-bezier(.25,.46,.45,.94); }

.h-sync .hstat-lbl,.h-sync .hstat-num { color:var(--green); }
.h-sync .hstat-fill { background:var(--green); box-shadow:0 0 6px var(--green); }
.h-integ .hstat-lbl,.h-integ .hstat-num { color:var(--green); }
.h-integ .hstat-fill { background:var(--green); box-shadow:0 0 6px var(--green); }
.h-noise .hstat-lbl,.h-noise .hstat-num { color:var(--green); }
.h-noise .hstat-fill { background:var(--green); box-shadow:0 0 6px var(--green); }

.noise-danger .h-noise .hstat-num { color:var(--red)!important; text-shadow:0 0 12px var(--red)!important; animation:numBlink .6s steps(1) infinite; }
.noise-danger .h-noise .hstat-fill { background:var(--red)!important; box-shadow:0 0 8px var(--red)!important; animation:barBlink .6s steps(1) infinite; }
@keyframes numBlink { 0%,49%{opacity:1;} 50%,100%{opacity:.2;} }
@keyframes barBlink { 0%,49%{opacity:1;} 50%,100%{opacity:.25;} }

@keyframes statPulse { 0%,100%{filter:brightness(1);} 40%{filter:brightness(3.5) drop-shadow(0 0 8px currentColor);} }
.pulsing { animation:statPulse .55s ease; }

#admin-box {
  border:1px solid rgba(191,95,255,.35); padding:8px 16px;
  font-family:var(--mono); font-size:11px; letter-spacing:2px;
  white-space:nowrap; flex-shrink:0;
  display:flex; align-items:center; gap:6px;
}
.adm-lbl { color:var(--txt-dim); }
#adm-val { color:var(--txt-dim); }
#adm-val.adm-on { color:var(--red); animation:admBlink .6s steps(1) infinite; }
@keyframes admBlink { 0%,49%{opacity:1;} 50%,100%{opacity:.15;} }

/* ── MAIN 2단 ── */
#main {
  height: calc(100vh - var(--hdr-h));
  display:flex; overflow:hidden;
}

/* ════ 좌측: 이미지 패널 ════ */
#img-panel {
  flex: 0 0 52%;
  position:relative; overflow:hidden;
  background:#000;
}

#bg-a, #bg-b {
  position:absolute; inset:0; z-index:0;
  background-color:#000;
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  transition:opacity 1.3s ease;
}
#bg-b { opacity:0; }

#scene-overlay {
  position:absolute; inset:0; z-index:1; pointer-events:none;
  transition:background 1.2s ease, opacity 1.2s ease;
}

#scanlines {
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);
  animation:scanFlow 10s linear infinite;
}
@keyframes scanFlow { from{background-position:0 0;} to{background-position:0 200px;} }

#smog {
  position:absolute; inset:0; z-index:3; pointer-events:none;
  background:
    radial-gradient(ellipse at center,transparent 25%,rgba(8,11,15,.5) 100%),
    linear-gradient(90deg,rgba(8,11,15,.08) 0%,transparent 20%,transparent 80%,rgba(8,11,15,.15) 100%);
}

#glitch-layer {
  position:absolute; inset:0; z-index:4; pointer-events:none;
  opacity:0; transition:opacity .3s;
}
.noise-high #glitch-layer { opacity:1; animation:glitchFx .4s steps(3) infinite; }
@keyframes glitchFx {
  0%  {clip-path:inset(4% 0 88% 0); transform:translate(-5px,0); background:rgba(255,0,60,.08);}
  25% {clip-path:inset(60% 0 6% 0); transform:translate(5px,0);  background:rgba(0,255,102,.05);}
  50% {clip-path:inset(28% 0 50% 0);transform:translate(-3px,2px);background:rgba(52,152,219,.05);}
  75% {clip-path:inset(76% 0 3% 0); transform:translate(3px,-2px);background:rgba(255,0,60,.09);}
  100%{clip-path:inset(4% 0 88% 0); transform:translate(0,0);  background:transparent;}
}

#danger {
  position:absolute; inset:0; z-index:5; pointer-events:none;
  background:rgba(255,0,60,.07); opacity:0;
}
.noise-danger #danger { animation:dangerPulse 1.3s ease-in-out infinite; }
@keyframes dangerPulse { 0%,100%{opacity:0;} 50%{opacity:1;} }

.noise-danger #img-panel { animation:rgbSplit 3.5s ease-in-out infinite; }
@keyframes rgbSplit {
  0%,78%,100%{filter:none;}
  79%{filter:drop-shadow(4px 0 var(--red)) drop-shadow(-4px 0 var(--cyan));}
  80%{filter:none;}
  85%{filter:drop-shadow(-3px 0 var(--red)) drop-shadow(3px 0 var(--cyan)) brightness(1.07);}
  86%{filter:none;}
}

.bc {
  position:absolute; z-index:6; pointer-events:none;
  font-family:var(--mono); font-size:5px;
  color:rgba(0,255,102,.07); line-height:1.4; white-space:pre;
}
#bc-tl {top:10px;left:10px;}
#bc-bl {bottom:10px;left:10px;}

#timer-ring {
  position:absolute; bottom:18px; right:18px; z-index:7;
  width:52px; height:52px;
  display:flex; align-items:center; justify-content:center;
}
#timer-ring svg {
  position:absolute; top:0; left:0; width:100%; height:100%;
  transform:rotate(-90deg);
}
#timer-num {
  font-family:var(--mono); font-size:15px; font-weight:bold;
  color:var(--red); text-shadow:0 0 12px var(--red);
  position:relative; z-index:1;
}
.timer-warn #timer-ring { animation:ringBlink .45s steps(1) infinite; }
@keyframes ringBlink { 0%,49%{opacity:1;} 50%,100%{opacity:.2;} }

/* ════ 우측: 정보 패널 ════ */
#info-panel {
  flex:1; background:var(--panel);
  border-left:1px solid rgba(255,255,255,.055);
  display:flex; flex-direction:column;
  padding:24px 26px 18px; gap:0;
  overflow:hidden; position:relative; z-index:10;
}

#scene-title {
  font-family:var(--mono); font-size:clamp(17px,2vw,24px);
  font-weight:bold; color:var(--amber);
  letter-spacing:1px; line-height:1.25;
  padding-bottom:10px;
  border-bottom:1px solid rgba(243,156,18,.28);
  margin-bottom:9px; flex-shrink:0;
  animation:neonFlicker 11s ease-in-out infinite;
}
@keyframes neonFlicker {
  0%,70%,72%,75%,100%{opacity:1;text-shadow:0 0 8px rgba(243,156,18,.4);}
  71%{opacity:.55;text-shadow:none;}
  73%,74%{opacity:.38;}
}

#scene-tag {
  font-family:var(--mono); font-size:11px;
  color:rgba(255,255,255,.3); letter-spacing:3px;
  margin-bottom:11px; flex-shrink:0; text-transform:uppercase;
}

#ui-narr {
  font-size:14px; color:var(--txt-dim);
  line-height:1.7; font-style:italic; letter-spacing:.3px;
  margin-bottom:13px; flex-shrink:0;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden;
}

#dialog-block {
  flex:1; display:flex; flex-direction:column;
  min-height:0; border-left:3px solid var(--purple);
  padding:2px 0 2px 15px; margin-bottom:14px;
  overflow:hidden; cursor:pointer; position:relative;
}
#char-name {
  font-family:var(--mono); font-size:15px; font-weight:bold;
  margin-bottom:8px; flex-shrink:0; letter-spacing:1px;
}
.cn-normal { color:var(--green); }
.cn-red    { color:var(--red); }
.cn-purple { color:var(--purple); }
.cn-dim    { color:var(--txt-dim); font-size:12px; letter-spacing:3px; }

.dialog-scroll {
  flex:1; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:rgba(191,95,255,.2) transparent;
}
.dialog-scroll::-webkit-scrollbar { width:3px; }
.dialog-scroll::-webkit-scrollbar-thumb { background:rgba(191,95,255,.2); }

/* =========================================
   대사 & 강조 스타일 상향 조정
========================================= */
#dialog-text {
  font-size:18px; line-height:1.75; color:#E0E0E0;
  font-weight:400; letter-spacing:.4px; white-space:pre-wrap; word-break:keep-all;
}
.hl-green  { color: var(--green); font-weight: 700; text-shadow: 0 0 5px rgba(0,255,102,0.4); }
.hl-red    { color: var(--red); font-weight: 700; text-shadow: 0 0 5px rgba(255,0,60,0.4); }
.hl-amber  { color: var(--amber); font-weight: 700; text-shadow: 0 0 5px rgba(243,156,18,0.4); }
.hl-cyan   { color: var(--cyan); font-weight: 700; text-shadow: 0 0 5px rgba(52,152,219,0.4); }
.hl-purple { color: var(--purple); font-weight: 700; text-shadow: 0 0 5px rgba(191,95,255,0.4); }

#cursor {
  display:inline-block; width:8px; height:18px;
  background:var(--green); animation:cursorBlink .65s steps(1) infinite;
  vertical-align:middle; margin-left:3px;
}
@keyframes cursorBlink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }

/* 안내 텍스트 가시성 향상 */
#skip-hint { font-family:var(--mono); font-size:11px; color:var(--txt-dim); margin-top:8px; flex-shrink:0; }
#cont-hint { 
  display:none; font-family:var(--body); font-size:14px; font-weight:bold; color:var(--green); 
  margin-top:10px; flex-shrink:0; animation:hintBounce .9s ease-in-out infinite; 
  text-shadow: 0 0 8px rgba(0,255,102,0.4); letter-spacing: 1px;
}
@keyframes hintBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }

.hr { height:1px; background:rgba(255,255,255,.06); margin-bottom:12px; flex-shrink:0; }

.ctrl-row { display:flex; gap:8px; margin-bottom:10px; flex-shrink:0; }
.ctrl-btn {
  font-family:var(--mono); font-size:10px; letter-spacing:2px;
  padding:8px 10px; background:transparent;
  color:var(--txt-dim); border:1px solid rgba(255,255,255,.09);
  cursor:pointer; transition:all .2s; flex:1; text-transform:uppercase;
}
.ctrl-btn:hover { color:var(--green); border-color:rgba(0,255,102,.3); background:rgba(0,255,102,.04); }
.ctrl-btn:disabled { opacity:.18; cursor:not-allowed; pointer-events:none; }
#btn-skip { color:var(--green); border-color:rgba(0,255,102,.2); }

#choices-wrap {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; flex-shrink:0;
}
#choices-wrap.single { grid-template-columns:1fr; }

.choice-card {
  background:rgba(10,13,18,.92);
  border:1px solid rgba(255,255,255,.09); border-radius:6px;
  padding:14px 14px 12px;
  cursor:pointer; transition:all .22s;
  display:flex; flex-direction:column; align-items:center; gap:7px;
  text-align:center; position:relative; overflow:hidden;
}
.choice-card::before {
  content:''; position:absolute; inset:0; opacity:0; transition:opacity .25s;
}
.choice-card:hover::before { opacity:1; }
.choice-card:active { transform:scale(.985); }

.type-warm   { border-color:rgba(243,156,18,.28); }
.type-warm::before   { background:radial-gradient(ellipse at center,rgba(243,156,18,.08),transparent 70%); }
.type-warm:hover     { border-color:rgba(243,156,18,.6); box-shadow:0 0 18px rgba(243,156,18,.15); }
.type-cold   { border-color:rgba(52,152,219,.28); }
.type-cold::before   { background:radial-gradient(ellipse at center,rgba(52,152,219,.08),transparent 70%); }
.type-cold:hover     { border-color:rgba(52,152,219,.6); box-shadow:0 0 18px rgba(52,152,219,.15); }
.type-dark   { border-color:rgba(255,0,60,.28); }
.type-dark::before   { background:radial-gradient(ellipse at center,rgba(255,0,60,.08),transparent 70%); }
.type-dark:hover     { border-color:rgba(255,0,60,.6); box-shadow:0 0 18px rgba(255,0,60,.15); }
.type-neutral{ border-color:rgba(0,255,102,.22); }
.type-neutral::before{ background:radial-gradient(ellipse at center,rgba(0,255,102,.07),transparent 70%); }
.type-neutral:hover  { border-color:rgba(0,255,102,.6); box-shadow:0 0 18px rgba(0,255,102,.12); }

.c-badge {
  width:24px; height:24px; border-radius:50%;
  font-family:var(--mono); font-size:11px; font-weight:bold;
  display:flex; align-items:center; justify-content:center;
}
.type-warm   .c-badge { background:var(--amber);  color:#000; }
.type-cold   .c-badge { background:var(--cyan);   color:#000; }
.type-dark   .c-badge { background:var(--red);    color:#fff; }
.type-neutral.c-badge,
.type-neutral .c-badge{ background:var(--green);  color:#000; }

.c-title { font-size:14px; font-weight:700; line-height:1.35; color:#fff; letter-spacing:.2px; }
.c-effects { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; }
.eff-pill {
  font-family:var(--mono); font-size:9px; padding:2px 6px;
  border-radius:10px; border:1px solid; letter-spacing:1px;
}
.ep-warm { color:var(--amber); border-color:rgba(243,156,18,.4); background:rgba(243,156,18,.08); }
.ep-cold { color:var(--cyan);  border-color:rgba(52,152,219,.4); background:rgba(52,152,219,.08); }
.ep-dark { color:var(--red);   border-color:rgba(255,0,60,.4);   background:rgba(255,0,60,.08);   }
.ep-heal { color:var(--green); border-color:rgba(0,255,102,.4);  background:rgba(0,255,102,.08);  }
.ep-flag { color:var(--purple);border-color:rgba(191,95,255,.4); background:rgba(191,95,255,.08); }

.choice-card.disabled { opacity:.16; cursor:not-allowed; pointer-events:none; }

#trans { position:fixed; inset:0; z-index:500; background:var(--bg); opacity:0; pointer-events:none; }
.transitioning #trans { animation:transAnim .85s ease forwards; }
@keyframes transAnim { 0%{opacity:0;} 25%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;} }
@keyframes shake {
  0%{transform:translate(0,0);} 15%{transform:translate(-3px,1px);} 30%{transform:translate(3px,-2px);}
  50%{transform:translate(-2px,2px);} 70%{transform:translate(2px,-1px);} 85%{transform:translate(-1px,1px);}
  100%{transform:translate(0,0);}
}
.shaking { animation:shake .35s ease !important; }

#title-screen {
  position:fixed; inset:0; z-index:900; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
}
.t-logo {
  font-family:var(--orb); font-weight:900; font-size:clamp(30px,5.5vw,56px);
  letter-spacing:10px; color:var(--green);
  text-shadow:0 0 28px var(--green),0 0 70px rgba(0,255,102,.2);
  text-align:center; line-height:1.05; animation:tGlow 3s ease-in-out infinite;
}
@keyframes tGlow {
  0%,100%{text-shadow:0 0 28px var(--green),0 0 60px rgba(0,255,102,.18);}
  50%{text-shadow:0 0 44px var(--green),0 0 110px rgba(0,255,102,.35);}
}
.t-sub  { font-family:var(--mono); font-size:10px; color:rgba(0,255,102,.3); letter-spacing:5px; text-align:center; }
.t-year { font-family:var(--mono); font-size:12px; color:rgba(255,255,255,.07); letter-spacing:12px; }
#boot-log { font-family:var(--mono); font-size:9px; color:rgba(0,255,102,.42); letter-spacing:1px; margin-top:16px; width:320px; max-width:92vw; height:68px; overflow:hidden; line-height:2; }
#start-btn {
  margin-top:16px; font-family:var(--mono); font-size:11px; letter-spacing:4px;
  padding:13px 38px; background:transparent; border:1px solid var(--green);
  color:var(--green); cursor:pointer; transition:all .25s; text-transform:uppercase;
  animation:btnPulse 2.2s ease-in-out infinite;
}
@keyframes btnPulse { 0%,100%{box-shadow:0 0 8px rgba(0,255,102,.2);} 50%{box-shadow:0 0 28px rgba(0,255,102,.5);} }
#start-btn:hover { background:rgba(0,255,102,.08); box-shadow:0 0 44px rgba(0,255,102,.5); }
.t-ver { position:fixed; bottom:12px; font-family:var(--mono); font-size:7px; color:rgba(0,255,102,.1); letter-spacing:3px; }

#ending { position:fixed; inset:0; z-index:800; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:40px; }
#ending.active { display:flex; }
.end-label   { font-family:var(--mono); font-size:9px; letter-spacing:5px; color:var(--txt-dim); text-transform:uppercase; }
.end-title   { font-family:var(--orb); font-size:clamp(22px,4vw,38px); font-weight:900; letter-spacing:6px; text-align:center; margin-top:4px; }
.end-summary { font-family:var(--body); font-size:13px; line-height:2; color:var(--txt-dim); text-align:center; max-width:540px; font-weight:300; white-space:pre-wrap; margin-top:10px; }
.end-stats   { font-family:var(--mono); font-size:9px; color:rgba(255,255,255,.1); margin-top:16px; line-height:2; text-align:center; border-top:1px solid rgba(255,255,255,.05); padding-top:14px; }
#restart-btn { margin-top:20px; font-family:var(--mono); font-size:10px; letter-spacing:3px; padding:12px 32px; background:transparent; border:1px solid var(--green); color:var(--green); cursor:pointer; transition:all .22s; }
#restart-btn:hover { background:rgba(0,255,102,.08); box-shadow:0 0 22px rgba(0,255,102,.32); }

@media (max-height:700px) {
  :root{--hdr-h:52px;} .hstat-num{font-size:18px;} #scene-title{font-size:15px;} 
  #dialog-text{font-size:15px;line-height:1.7;} #cont-hint{font-size:12px;}
}
</style>
</head>
<body>

<div id="title-screen">
  <div class="t-logo">NEO-DOROTHY<br>2099</div>
  <div class="t-sub">잃어버린 동기화 // LOST SYNC</div>
  <div class="t-year">— 2099 —</div>
  <div id="boot-log"></div>
  <button id="start-btn" onclick="bootGame()">▶ SYSTEM BOOT</button>
  <div class="t-ver">VER.2099.04.17 // BUILD_NEO_1.0.0 // NODE_KANSAS_ALPHA</div>
</div>

<div id="trans"></div>

<div id="ending">
  <div class="end-label" id="end-label">SYSTEM LOG</div>
  <div class="end-title" id="end-title"></div>
  <div class="end-summary" id="end-summary"></div>
  <div class="end-stats"  id="end-stats"></div>
  <button id="restart-btn" onclick="restartGame()">▶ RESTART SYSTEM</button>
</div>

<header id="hud">
  <div id="hud-logo">NEO-DOROTHY 2099</div>
  <div class="hud-div"></div>
  <div id="hud-center">
    <div class="hud-stat h-sync">
      <div class="hstat-lbl">SYNC</div>
      <div class="hstat-num" id="num-sync">0</div>
      <div class="hstat-bar"><div class="hstat-fill" id="fill-sync"></div></div>
    </div>
    <div class="hud-stat h-integ">
      <div class="hstat-lbl">INTEG</div>
      <div class="hstat-num" id="num-integ">0</div>
      <div class="hstat-bar"><div class="hstat-fill" id="fill-integ"></div></div>
    </div>
    <div class="hud-stat h-noise">

/* ── 배경 크로스페이드 (이미지/오버레이 완전 분리) ── */
let bgActive = 'a';

function applyBg(sc) {
  const bgA  = document.getElementById('bg-a');
  const bgB  = document.getElementById('bg-b');
  const ovEl = document.getElementById('scene-overlay');
  const cur  = bgActive === 'a' ? bgA : bgB;
  const nxt  = bgActive === 'a' ? bgB : bgA;

  ovEl.style.background = sc.overlay || 'transparent';
  if (sc.tint) ovEl.style.boxShadow = `inset 0 0 220px ${sc.tint}`;
  else ovEl.style.boxShadow = 'none';

  if (sc.img) {
    const img = new Image();
    img.onload = () => {
      nxt.style.backgroundImage    = `url("${sc.img}")`;
      nxt.style.backgroundSize     = 'cover';
      nxt.style.backgroundPosition = 'center center';
      nxt.style.backgroundRepeat   = 'no-repeat';
      nxt.style.transition = 'opacity 1.3s ease';
      nxt.style.opacity    = '1';
      cur.style.transition = 'opacity 1.3s ease';
      cur.style.opacity    = '0';
      bgActive = bgActive === 'a' ? 'b' : 'a';
    };
    img.onerror = () => {
      nxt.style.backgroundImage    = 'linear-gradient(135deg,#0a0f18 0%,#050810 100%)';
      nxt.style.backgroundSize     = 'cover';
      nxt.style.transition = 'opacity 0.8s ease';
      nxt.style.opacity    = '1';
      cur.style.opacity    = '0';
      bgActive = bgActive === 'a' ? 'b' : 'a';
    };
    img.src = sc.img;
  } else {
    nxt.style.backgroundImage    = 'linear-gradient(135deg,#020305 0%,#080a0d 100%)';
    nxt.style.backgroundSize     = 'cover';
    nxt.style.backgroundPosition = 'center';
    nxt.style.transition = 'opacity 0.8s ease';
    nxt.style.opacity    = '1';
    cur.style.transition = 'opacity 0.8s ease';
    cur.style.opacity    = '0';
    bgActive = bgActive === 'a' ? 'b' : 'a';
  }
}

function prefetchImg(sc) {
  if (sc && sc.img) { const i = new Image(); i.src = sc.img; }
}

/* ── 원형 타이머 ── */
let timerVal = 8, timerIntv = null;
const CIRC = 138;

function startTimer() {
  clearInterval(timerIntv); timerVal = 8; renderTimerUI();
  document.body.classList.remove('timer-warn');
  timerIntv = setInterval(() => {
    timerVal--;
    renderTimerUI();
    if (timerVal <= 2) document.body.classList.add('timer-warn');
    if (timerVal <= 0) {
      applyEffects({GLITCH:3},{});
      timerVal = 8; document.body.classList.remove('timer-warn'); renderTimerUI();
    }
  }, 1000);
}
function renderTimerUI() {
  document.getElementById('timer-num').textContent = String(timerVal).padStart(2,'0');
  document.getElementById('timer-arc').style.strokeDashoffset = CIRC - CIRC * timerVal / 8;
}
function stopTimer() { clearInterval(timerIntv); }

/* ── HTML 지원 타이핑 엔진 ── */
let typingTimer=null, isTyping=false, fullText='', onTypeDone=null;
function startTyping(text, cb) {
  fullText=text; isTyping=true; onTypeDone=cb;
  const el=document.getElementById('dialog-text');
  const cur=document.getElementById('cursor');
  const scrl=document.getElementById('dialog-scroll');
  el.innerHTML=''; cur.style.display='inline-block';
  document.getElementById('skip-hint').style.display='block';
  document.getElementById('cont-hint').style.display='none';
  document.getElementById('btn-skip').disabled=false;
  clearTimeout(typingTimer);
  
  let currentHTML = "";
  let i = 0;
  
  (function tick(){
    if(!isTyping) return;
    if(i < fullText.length){
      // HTML 태그일 경우 딜레이 없이 한 번에 추가
      if(fullText[i] === '<') {
        let tag = "";
        while(fullText[i] !== '>' && i < fullText.length) {
          tag += fullText[i];
          i++;
        }
        tag += '>';
        currentHTML += tag;
        i++;
        tick(); // 태그 추가 후 지연 없이 바로 다음 글자로
        return;
      } else {
        currentHTML += fullText[i];
        i++;
      }
      
      el.innerHTML = currentHTML + (state.GLITCH>=50&&Math.random()<.04 ? '▓▒░'[Math.floor(Math.random()*3)] : '');
      scrl.scrollTop = scrl.scrollHeight;
      typingTimer = setTimeout(tick, 26+(state.GLITCH>60?Math.random()*65:0));
    } else {
      finishTyping();
    }
  })();
}
function finishTyping(){
  isTyping=false; clearTimeout(typingTimer);
  document.getElementById('dialog-text').innerHTML=fullText;
  document.getElementById('cursor').style.display='none';
  document.getElementById('skip-hint').style.display='none';
  document.getElementById('cont-hint').style.display='block';
  document.getElementById('btn-skip').disabled=true;
  if(onTypeDone) onTypeDone();
}
function skipTyping(){ if(!isTyping)return; clearTimeout(typingTimer); finishTyping(); }

/* ── HUD ── */
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
function updateHUD(ch={}){
  setBar('fill-sync', 'num-sync',  clamp(state.WARM,  0,100), state.WARM);
  setBar('fill-integ','num-integ', clamp(state.COLD,  0,100), state.COLD);
  setBar('fill-noise','num-noise', clamp(state.GLITCH,0,100), state.GLITCH);
  if(ch.WARM)   pulseEl('fill-sync',  'num-sync');
  if(ch.COLD)   pulseEl('fill-integ', 'num-integ');
  if(ch.GLITCH) pulseEl('fill-noise', 'num-noise');
  const bc=document.body.classList;
  bc.remove('noise-high','noise-danger');
  if(state.GLITCH>=80) bc.add('noise-danger','noise-high');
  else if(state.GLITCH>=50) bc.add('noise-high');
  const adm=document.getElementById('adm-val');
  if(state.flags.WITCH_CORE){ adm.textContent='TRUE'; adm.className='adm-on'; bc.add('core-active'); }
  else { adm.textContent='FALSE'; adm.className=''; bc.remove('core-active'); }
}
function setBar(fId,nId,pct,val){ document.getElementById(fId).style.width=pct+'%'; document.getElementById(nId).textContent=val; }
function pulseEl(fId,nId){
  [fId,nId].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove('pulsing'); void el.offsetWidth; el.classList.add('pulsing');
    setTimeout(()=>el.classList.remove('pulsing'),600);
  });
}

/* ── 효과 적용 ── */
function applyEffects(eff={},flags={}){
  const ch={};
  if(eff.WARM   !==undefined){state.WARM  =clamp(state.WARM  +eff.WARM,  0,100);ch.WARM=1;}
  if(eff.COLD   !==undefined){state.COLD  =clamp(state.COLD  +eff.COLD,  0,100);ch.COLD=1;}
  if(eff.GLITCH !==undefined){state.GLITCH=clamp(state.GLITCH+eff.GLITCH,0,100);ch.GLITCH=1;}
  Object.assign(state.flags,flags);
  updateHUD(ch);
}

/* ── 씬 렌더링 ── */
function renderScene(sceneId){
  const sc=sceneData[sceneId];
  if(!sc){console.error('씬 없음:',sceneId);return;}
  state.currentScene=sceneId;
  sceneHistory.push({sceneId,snap:snap()});
  document.getElementById('btn-back').disabled=sceneHistory.length<2;

  applyBg(sc);
  startTimer();

  document.getElementById('scene-title').textContent=sc.title||'';
  document.getElementById('scene-tag').textContent  =sc.tag  ||'';
  document.getElementById('ui-narr').textContent    =sc.narr ||'';

  const cn=document.getElementById('char-name');
  if(sc.char){ cn.textContent=sc.char+'  :'; cn.className='cn-'+(sc.charType||'normal'); }
  else { cn.textContent='[ NARRATION ]'; cn.className='cn-dim'; }

  document.getElementById('choices-wrap').innerHTML='';

  const raw=typeof sc.text==='function'?sc.text(state):sc.text;
  startTyping(raw,()=>{
    if(sc.ending&&(!sc.choices||sc.choices.length===0)){
      setTimeout(()=>showEndingScreen(sc),1500); return;
    }
    if(sc.choices&&sc.choices.length>0) renderChoices(sc.choices,sc);
  });
}

/* ── 선택지 카드 ── */
function buildPills(c,ok){
  if(!ok) return '';
  const eff=c.effects||{};
  let h='';
  if(eff.WARM)                   h+=`<span class="eff-pill ep-warm">SYNC ${eff.WARM>0?'+':''}${eff.WARM}</span>`;
  if(eff.COLD)                   h+=`<span class="eff-pill ep-cold">INTEG ${eff.COLD>0?'+':''}${eff.COLD}</span>`;
  if(eff.GLITCH!=null&&eff.GLITCH!==0){
    h+=eff.GLITCH>0?`<span class="eff-pill ep-dark">NOISE +${eff.GLITCH}</span>`
                   :`<span class="eff-pill ep-heal">NOISE ${eff.GLITCH}</span>`;
  }
  if(c.flags){
    if(c.flags.WITCH_CORE)       h+=`<span class="eff-pill ep-flag">CORE획득</span>`;
    if(c.flags.scarecrow_friend) h+=`<span class="eff-pill ep-heal">우정+</span>`;
    if(c.flags.tin_friend)       h+=`<span class="eff-pill ep-heal">공감링크</span>`;
    if(c.flags.lion_friend)      h+=`<span class="eff-pill ep-heal">용기+</span>`;
    if(c.flags.from_alt)         h+=`<span class="eff-pill ep-heal">복귀</span>`;
  }
  return h;
}

function renderChoices(choices,sc){
  const wrap=document.getElementById('choices-wrap');
  wrap.innerHTML='';
  wrap.className=choices.length===1?'single':'';
  let allDisabled=true;
  choices.forEach((c,i)=>{
    const ok=c.condition?c.condition(state):true;
    if(ok) allDisabled=false;
    const card=document.createElement('div');
    card.className=`choice-card type-${c.type||'neutral'}${!ok?' disabled':''}`;
    const L=String.fromCharCode(65+i);
    const pills=buildPills(c,ok);
    if(!ok){
      card.innerHTML=`<div class="c-badge" style="background:rgba(80,80,76,.4);color:var(--txt-dim)">⊗</div><div class="c-title" style="color:var(--txt-dim);font-size:11px;">${c.disabledText||c.text.replace('\n',' ')}</div>`;
    } else {
      card.innerHTML=`<div class="c-badge">${L}</div><div class="c-title">${c.text.replace('\n','<br>')}</div>${pills?`<div class="c-effects">${pills}</div>`:''}`;
      card.addEventListener('click',()=>onChoiceClick(c));
    }
    wrap.appendChild(card);
  });
  choices.forEach(c=>{ if(c.next) prefetchImg(sceneData[c.next]); });
  
  if(allDisabled&&sc.tag&&sc.tag.includes('PHASE 3'))
    setTimeout(()=>transitionTo('BAD_END'),2200);
}

/* ── 이벤트 ── */
function onChoiceClick(c){
  document.querySelectorAll('.choice-card').forEach(el=>el.style.pointerEvents='none');
  document.body.classList.add('shaking');
  setTimeout(()=>document.body.classList.remove('shaking'),380);
  applyEffects(c.effects||{},c.flags||{});
  if(c.action){setTimeout(c.action,350);return;}
  if(c.next)  setTimeout(()=>transitionTo(c.next),320);
}
function onDialogClick(){ if(isTyping) skipTyping(); }
function onSkipClick()  { if(isTyping) skipTyping(); }
function goBack(){
  if(sceneHistory.length<2) return;
  sceneHistory.pop();
  const prev=sceneHistory.pop();
  Object.assign(state,{WARM:prev.snap.WARM,COLD:prev.snap.COLD,GLITCH:prev.snap.GLITCH,flags:{...prev.snap.flags}});
  updateHUD(); transitionTo(prev.sceneId);
}
document.addEventListener('keydown',e=>{
  if((e.code==='Space'||e.code==='Enter')&&isTyping){e.preventDefault();skipTyping();}
});

/* ── 씬 전환 ── */
function transitionTo(id){
  document.body.classList.add('transitioning');
  const ns=sceneData[id]; if(ns) prefetchImg(ns);
  setTimeout(()=>{document.body.classList.remove('transitioning');renderScene(id);},480);
}

/* ── 엔딩 ── */
function showEndingScreen(sc){
  stopTimer();
  const e=sc.ending;
  document.getElementById('end-label').textContent =e.label;
  document.getElementById('end-title').textContent =e.title;
  document.getElementById('end-title').style.color =e.color;
  document.getElementById('end-title').style.textShadow=`0 0 30px ${e.color}`;
  
  document.getElementById('end-summary').innerHTML=typeof sc.text==='function'?sc.text(state):sc.text;
  
  const route=state.WARM>state.COLD?'WARM — 연대':'COLD — 냉철';
  document.getElementById('end-stats').textContent=
    `SYNC: ${state.WARM}  /  INTEG: ${state.COLD}  /  NOISE: ${state.GLITCH}\n`+
    `ADMIN_KEY: ${state.flags.WITCH_CORE?'TRUE ⚠':'FALSE'}  /  ROUTE: ${route}  /  ENDING: ${e.type}`;
  document.getElementById('ending').classList.add('active');
}

/* ── 재시작 ── */
function restartGame(){
  state.currentScene='S1'; state.WARM=0; state.COLD=0; state.GLITCH=0;
  state.flags={scarecrow_friend:false,tin_friend:false,lion_friend:false,from_alt:false,WITCH_CORE:false};
  sceneHistory.length=0;
  document.getElementById('ending').classList.remove('active');
  document.body.classList.remove('noise-high','noise-danger','core-active','timer-warn');
  updateHUD(); transitionTo('S1');
}

/* ── 바코드 장식 ── */
function buildBarcodes(){
  const p=['▌▌▌ ▌▌ ▌▌▌▌ ▌ ▌▌','▌ ▌▌▌▌ ▌▌ ▌ ▌▌▌','▌▌ ▌ ▌▌▌ ▌▌▌▌ ▌'];
  const code=p.map(x=>x+' '+(Math.random()*9e5|0).toString(16).toUpperCase()).join('\n');
  ['bc-tl','bc-bl'].forEach(id=>document.getElementById(id).textContent=code);
}

/* ── 부팅 시퀀스 ── */
const bootLines=[
  '> SYS_BOOT: NEO-DOROTHY 2099 v1.0 초기화 중...',
  '> MEM_ALLOC: 2,099MB / 캔자스 노드 연결 시도',
  '> [경고] 데이터 토네이도 감지됨 — 강도 CRITICAL',
  '> WITCH_SCAN: W.I.T.C.H v3.7 바이러스 확인됨',
  '> ALLY_PING: 허수아비 ✗  양철꾼 ✗  사자 ✗',
  '> SYNC_MODULE: 동기화 프로토콜 대기 중...',
  '> 준비 완료. 부팅 허가를 기다리는 중...'
];
function runBootLog(){
  const log=document.getElementById('boot-log'); let i=0;
  (function next(){ if(i<bootLines.length){ log.textContent+=(i>0?'\n':'')+bootLines[i++]; setTimeout(next,265); } })();
}
function bootGame(){
  const ts=document.getElementById('title-screen');
  ts.style.transition='opacity .9s ease'; ts.style.opacity='0'; ts.style.pointerEvents='none';
  setTimeout(()=>{ ts.style.display='none'; updateHUD(); buildBarcodes(); renderScene('S1'); },900);
}

/* ── 초기 실행 ── */
window.addEventListener('load',()=>{
  updateHUD(); buildBarcodes(); runBootLog();
  document.getElementById('btn-back').disabled=true;
  document.getElementById('btn-skip').disabled=true;
});
</script>
